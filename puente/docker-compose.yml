services:
  puente:
    build: .
    container_name: localcito-puente
    # Para desarrollo local (ambos contenedores en misma máquina): usar networks
    # Para producción (máquinas separadas): comentar networks y descomentar network_mode
    networks:
      - localcito
    # network_mode: host  # Descomentar para producción Linux
    ports:
      - "5000:5000/udp"
      - "4000:4000/udp"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  localcito:
    name: localcito-network
    driver: bridge
